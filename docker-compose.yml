services:
    telebot:
        image: telebot
        container_name: telebot
        env_file:
            - .env
        build:
            context: .
            dockerfile: Dockerfile
        depends_on:
            - mongodb
        networks:
            - base-network

    mongodb:
        image: mongo:7.0
        container_name: botbot_mongodb_stag
        restart: unless-stopped
        environment:
            MONGO_INITDB_DATABASE: botdb
        volumes:
            - mongodb_data:/data/db
            - mongodb_config:/data/configdb
        networks:
            - base-network

    redis:
        image: redis:7-alpine
        container_name: botbot_redis_stag
        restart: unless-stopped
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        networks:
            - base-network

volumes:
    mongodb_data:
        driver: local
    mongodb_config:
        driver: local
    redis_data:
        driver: local

networks:
    base-network:
        driver: bridge
