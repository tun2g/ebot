version: "3.7"

services:
    service-bot-dev:
        image: telebot_dev
        container_name: telebot_dev
        env_file:
            - .env
        build:
            context: .
            dockerfile: Dockerfile
        depends_on:
            - mongodb
            - redis
        networks:
            - base-network

    mongodb:
        image: mongo:7.0
        container_name: botbot_mongodb_dev
        restart: unless-stopped
        environment:
            MONGO_INITDB_DATABASE: botdb
        ports:
            - "27017:27017"
        volumes:
            - mongodb_data:/data/db
            - mongodb_config:/data/configdb
        networks:
            - base-network

    redis:
        image: redis:7-alpine
        container_name: botbot_redis_dev
        restart: unless-stopped
        command: redis-server --appendonly yes
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - base-network

volumes:
    mongodb_data:
        driver: local
    mongodb_config:
        driver: local
    redis_data:
        driver: local

networks:
    base-network:
        driver: bridge